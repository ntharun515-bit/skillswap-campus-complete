<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | SkillSwap</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/toast.js"></script>
  <script src="/frontend/js/theme.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/components.js"></script>

  <script src="/frontend/js/socket.js"></script>
  <script src="/frontend/js/dashboard-layout.js"></script>

  <script>
    initDashboard('student', 'portfolio', 'Portfolio Creator', function(el) {
      el.innerHTML = `
        <div style="display:grid;grid-template-columns:300px 1fr;gap:2rem">
          <div>
            <form id="pf" class="glass card" style="padding:1.5rem;display:flex;flex-direction:column;gap:1rem;position:sticky;top:1rem">
              <h3 style="font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.25rem">➕ Add Portfolio Item</h3>
              <p style="color:var(--text-secondary);font-size:0.75rem;margin-bottom:0.5rem">Showcase your past code, UX designs, or essays to clients.</p>
              
              <div class="form-group">
                <label style="font-weight:600;font-size:0.8rem">Project Title</label>
                <input type="text" name="title" id="p-title" placeholder="e.g. Chat App Prototype" required style="width:100%">
              </div>
              
              <div class="form-group">
                <label style="font-weight:600;font-size:0.8rem">Project URL (Optional)</label>
                <input type="url" name="project_url" id="p-url" placeholder="https://github.com/..." style="width:100%">
              </div>

              <div class="form-group">
                <label style="font-weight:600;font-size:0.8rem">Description</label>
                <textarea name="description" id="p-desc" placeholder="Briefly describe what you built..." rows="3" style="width:100%"></textarea>
              </div>

              <div class="form-group">
                <label style="font-weight:600;font-size:0.8rem">Upload Preview Image</label>
                <input type="file" name="file" id="p-file" style="width:100%;font-size:0.8rem">
              </div>

              <button class="btn btn-primary" type="submit" style="width:100%;margin-top:0.5rem">Save Item</button>
            </form>
          </div>

          <div>
            <article class="glass card" style="min-height:400px">
              <h3 style="font-size:1.25rem;margin-bottom:1.5rem">🎨 My Showcase Gallery</h3>
              <div id="pl" class="grid grid-2">
                <div class="glass card skeleton" style="height:120px"></div>
                <div class="glass card skeleton" style="height:120px"></div>
              </div>
            </article>
          </div>
        </div>
      `;

      const pl = document.getElementById('pl');
      const pf = document.getElementById('pf');

      async function loadPortfolio() {
        try {
          pl.innerHTML = `
            <div class="glass card skeleton" style="height:120px"></div>
            <div class="glass card skeleton" style="height:120px"></div>
          `;
          
          const items = await API.get('/users/portfolio');
          if (items.length === 0) {
            pl.innerHTML = `
              <div style="grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text-secondary)">
                <span style="font-size:3rem">🎨</span>
                <p style="margin-top:1rem">No projects showcased yet. Add your first item to build client trust!</p>
              </div>
            `;
            return;
          }

          pl.innerHTML = items.map(i => {
            const externalLink = i.project_url 
              ? `<a href="${i.project_url}" target="_blank" class="btn btn-ghost btn-sm" style="margin-top:0.75rem;display:inline-flex;align-items:center;gap:0.3rem">🔗 View Live Project</a>` 
              : '';

            const imagePreview = i.image_path 
              ? `<div style="margin-bottom:0.75rem;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)">
                   <img src="${i.image_path}" style="width:100%;height:100px;object-fit:cover" alt="${i.title}">
                 </div>`
              : '';

            return `
              <article class="glass card" style="display:flex;flex-direction:column;justify-content:between">
                <div>
                  ${imagePreview}
                  <h4 style="font-size:1.05rem;color:var(--text-primary);margin-bottom:0.25rem">${i.title}</h4>
                  <p style="font-size:0.85rem;color:var(--text-secondary);line-height:1.4">${i.description || 'No description provided.'}</p>
                </div>
                <div>
                  ${externalLink}
                </div>
              </article>
            `;
          }).join('');

        } catch (err) {
          showToast('Failed to load portfolio items: ' + err.message, 'error');
        }
      }

      pf.onsubmit = async e => {
        e.preventDefault();
        
        try {
          const formData = new FormData(pf);
          await API.upload('/users/portfolio', formData);
          
          showToast('Portfolio item successfully showcased!', 'success');
          pf.reset();
          loadPortfolio();
        } catch (err) {
          showToast('Failed to save portfolio item: ' + err.message, 'error');
        }
      };

      loadPortfolio();
    });
  </script>
</body>
</html>
