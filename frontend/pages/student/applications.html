<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications | SkillSwap</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    .af-btn{padding:.35rem .85rem;border-radius:999px;font-size:.78rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .2s}
    .af-btn.active,.af-btn:hover{background:var(--accent-glow);color:var(--accent);border-color:var(--accent)}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/toast.js"></script>
  <script src="/frontend/js/theme.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/components.js"></script>
  <script src="/frontend/js/socket.js"></script>
  <script src="/frontend/js/dashboard-layout.js"></script>
  <script>
    initDashboard('student', 'applications', 'Applications', function(el) {
      el.innerHTML = `
        <div class="stats-grid" id="as"></div>
        <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap" id="af">
          <button class="af-btn active" data-f="all">All</button>
          <button class="af-btn" data-f="pending">Pending</button>
          <button class="af-btn" data-f="accepted">Hired</button>
          <button class="af-btn" data-f="rejected">Declined</button>
        </div>
        <div class="grid grid-2" id="al" style="gap:1rem"></div>
      `;

      let allApps = [], filter = 'all';

      document.getElementById('af').onclick = e => {
        if (!e.target.classList.contains('af-btn')) return;
        document.querySelectorAll('.af-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        filter = e.target.dataset.f;
        render();
      };

      async function load() {
        try {
          allApps = await API.get('/projects/applications/my');
          const p = allApps.filter(a => a.status === 'pending').length;
          const h = allApps.filter(a => a.status === 'accepted').length;
          const r = allApps.filter(a => a.status === 'rejected').length;
          document.getElementById('as').innerHTML = `
            <article class="glass stat-card"><span class="label">⏳ Pending</span><span class="value" style="color:var(--warning)">${p}</span></article>
            <article class="glass stat-card"><span class="label">✅ Hired</span><span class="value" style="color:var(--success)">${h}</span></article>
            <article class="glass stat-card"><span class="label">❌ Declined</span><span class="value" style="color:var(--text-secondary)">${r}</span></article>
          `;
          render();
        } catch (err) { showToast('Error: ' + err.message, 'error'); }
      }

      function render() {
        const c = document.getElementById('al');
        const list = filter === 'all' ? allApps : allApps.filter(a => a.status === filter);
        if (!list.length) {
          c.innerHTML = `<div class="glass card" style="grid-column:1/-1;text-align:center;padding:2rem"><p style="color:var(--text-secondary);font-size:.88rem">No ${filter === 'all' ? '' : filter} applications.</p></div>`;
          return;
        }
        c.innerHTML = list.map(a => {
          const bid = a.proposed_rate ? formatMoney(a.proposed_rate) : 'Standard';
          let badge = '', action = '';
          if (a.status === 'accepted') {
            badge = '<span class="badge" style="background:rgba(16,185,129,.12);color:var(--success)">Hired</span>';
            action = `<a href="workspace.html?project=${a.project_id}" class="btn btn-primary btn-sm" style="font-size:.72rem;margin-top:.5rem">Open Workspace</a>`;
          } else if (a.status === 'rejected') {
            badge = '<span class="badge" style="background:rgba(239,68,68,.12);color:var(--danger)">Declined</span>';
          } else {
            badge = '<span class="badge" style="background:rgba(245,158,11,.12);color:var(--warning)">Pending</span>';
          }
          return `
            <article class="glass card" style="padding:1.25rem;display:flex;flex-direction:column">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
                ${badge}
                <span style="font-size:.72rem;color:var(--text-secondary)">${formatDate(a.created_at)}</span>
              </div>
              <h3 style="font-size:.92rem;font-weight:700;margin-bottom:.3rem">${a.project_title}</h3>
              <p style="font-size:.8rem;color:var(--text-secondary);line-height:1.4;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${a.cover_letter}</p>
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)">
                <span style="font-weight:700;font-size:.85rem;color:var(--success)">${bid}</span>
                ${action}
              </div>
            </article>`;
        }).join('');
      }
      load();
    });
  </script>
</body>
</html>
