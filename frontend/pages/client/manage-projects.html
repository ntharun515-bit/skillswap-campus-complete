<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Projects | SkillSwap</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" defer></script>
  <style>
    .camp-card{padding:1.25rem 1.5rem;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-glass);display:flex;flex-direction:column;transition:border-color .2s}
    .camp-card:hover{border-color:rgba(13,148,136,.2)}
    .prog-outer{width:100%;height:5px;border-radius:99px;background:var(--bg-secondary);overflow:hidden;margin-top:.35rem}
    .prog-inner{height:100%;border-radius:99px;background:var(--gradient-hero);transition:width .3s}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/toast.js"></script>
  <script src="/frontend/js/theme.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/components.js"></script>
  <script src="/frontend/js/socket.js"></script>
  <script src="/frontend/js/dashboard-layout.js"></script>
  <script>
    initDashboard('client', 'manage-projects', 'Manage Projects', function(el) {
      el.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
          <p style="color:var(--text-secondary);font-size:.88rem;margin:0">Track progress, review bids, and manage escrow for all your projects.</p>
          <a href="post-project.html" class="btn btn-primary btn-sm">+ New Project</a>
        </div>
        <div id="pl" class="grid grid-2" style="gap:1rem">
          <div class="skeleton" style="height:140px;border-radius:var(--radius-lg)"></div>
          <div class="skeleton" style="height:140px;border-radius:var(--radius-lg)"></div>
        </div>
      `;

      const listEl = document.getElementById('pl');

      async function load() {
        try {
          const projects = await API.get('/projects/my');
          if (!projects.length) {
            listEl.innerHTML = `
              <div style="grid-column:1/-1;text-align:center;padding:3rem" class="glass card">
                <div style="font-size:2.5rem;margin-bottom:.75rem">📁</div>
                <h3 style="font-size:1rem">No Projects Yet</h3>
                <p style="color:var(--text-secondary);font-size:.85rem;margin-top:.35rem">Post your first project to get started.</p>
                <a href="post-project.html" class="btn btn-primary btn-sm" style="margin-top:1rem">Post Project</a>
              </div>`;
            return;
          }

          listEl.innerHTML = projects.map(p => {
            const bids = p.application_count || 0;
            const progress = p.progress || 0;
            let badge = '', actions = '';

            if (p.status === 'open') {
              badge = '<span class="badge" style="background:rgba(16,185,129,.12);color:var(--success)">Open</span>';
              actions = `<a href="applicants.html?project=${p.id}" class="btn btn-ghost btn-sm" style="font-size:.75rem">Review Bids (${bids})</a>`;
            } else if (p.status === 'in_progress') {
              badge = '<span class="badge" style="background:rgba(245,158,11,.12);color:var(--warning)">In Progress</span>';
              actions = `
                <div style="display:flex;gap:.4rem;flex-wrap:wrap">
                  <a href="workspace.html?project=${p.id}" class="btn btn-ghost btn-sm" style="font-size:.75rem">Workspace</a>
                  <button class="btn btn-ghost btn-sm release-btn" data-id="${p.id}" style="font-size:.75rem;color:var(--success)">Release Payment</button>
                </div>`;
            } else if (p.status === 'submitted') {
              badge = '<span class="badge" style="background:rgba(13,148,136,.12);color:var(--accent)">Submitted</span>';
              actions = `<a href="workspace.html?project=${p.id}" class="btn btn-primary btn-sm" style="font-size:.75rem">Review Work</a>`;
            } else {
              badge = '<span class="badge" style="background:rgba(16,185,129,.12);color:var(--success)">Done</span>';
              actions = '<span style="font-size:.78rem;color:var(--text-secondary)">Settled</span>';
            }

            const progBar = p.status === 'in_progress' ? `
              <div style="margin-top:.75rem">
                <div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-secondary)">
                  <span>Progress</span><span id="pn-${p.id}" style="font-weight:700;color:var(--accent)">${progress}%</span>
                </div>
                <div class="prog-outer"><div class="prog-inner" id="pf-${p.id}" style="width:${progress}%"></div></div>
                <input type="range" min="0" max="100" value="${progress}" class="prog-slider" data-id="${p.id}" style="width:100%;margin-top:.5rem;height:4px">
              </div>` : '';

            return `
              <article class="camp-card">
                <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:.5rem">
                  <h3 style="font-size:.95rem;font-weight:700;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${p.title}</h3>
                  ${badge}
                </div>
                <div style="font-size:.85rem;font-weight:700;color:var(--success)">${formatMoney(p.budget)}</div>
                ${progBar}
                <div style="margin-top:auto;padding-top:.75rem">${actions}</div>
              </article>`;
          }).join('');

          // Progress sliders
          listEl.querySelectorAll('.prog-slider').forEach(s => {
            s.oninput = () => {
              const f = document.getElementById(`pf-${s.dataset.id}`);
              const n = document.getElementById(`pn-${s.dataset.id}`);
              if (f) f.style.width = s.value + '%';
              if (n) n.textContent = s.value + '%';
            };
            s.onchange = async () => {
              try {
                await API.put(`/projects/${s.dataset.id}`, { progress: +s.value });
                showToast('Progress updated', 'success');
              } catch (err) {
                showToast('Failed: ' + err.message, 'error');
              }
            };
          });

          // Release buttons
          listEl.querySelectorAll('.release-btn').forEach(btn => {
            btn.onclick = async () => {
              if (confirm('Release escrow payment to the freelancer? This marks the project complete.')) {
                try {
                  await API.post(`/projects/${btn.dataset.id}/payments`, { milestone: 'Approved' });
                  showToast('Payment released!', 'success');
                  load();
                } catch (err) {
                  showToast('Failed: ' + err.message, 'error');
                }
              }
            };
          });

        } catch (err) {
          showToast('Failed to load: ' + err.message, 'error');
        }
      }
      load();
    });
  </script>
</body>
</html>
