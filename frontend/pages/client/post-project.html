<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Project | SkillSwap</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/toast.js"></script>
  <script src="/frontend/js/theme.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/components.js"></script>
  <script src="/frontend/js/socket.js"></script>
  <script src="/frontend/js/dashboard-layout.js"></script>
  <script>
    initDashboard('client', 'post-project', 'Post Project', function(el) {
      el.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 280px;gap:1.5rem;max-width:1000px">
          <form id="pf" class="glass card" style="padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem">
            <div>
              <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:.2rem">Create New Project</h2>
              <p style="color:var(--text-secondary);font-size:.82rem">Define your requirements and let AI match you with the best campus talent.</p>
            </div>

            <div class="form-group" style="margin-bottom:0">
              <label style="font-weight:600;font-size:.82rem">Project Title</label>
              <input type="text" id="t" placeholder="e.g. Build REST API with Flask" required class="form-control">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Category</label>
                <select id="cat" class="form-control">
                  <option value="1">💻 Development & Tech</option>
                  <option value="2">🎨 Design & Creative</option>
                  <option value="3">📝 Content & Writing</option>
                  <option value="4">📢 Marketing</option>
                  <option value="5">📚 Academic Services</option>
                  <option value="6">🤖 AI & Automation</option>
                  <option value="7">🎥 Media Production</option>
                  <option value="8">📊 Data & Analytics</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Required Skills (Comma separated)</label>
                <input type="text" id="skills" placeholder="Python, Flask, HTML" required class="form-control">
              </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Project Type</label>
                <select id="ptype" class="form-control">
                  <option value="freelance">💼 Freelance Contract</option>
                  <option value="internship">🎓 Campus Internship</option>
                  <option value="contest">🏆 Skill Contest</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Experience Level Required</label>
                <select id="elevel" class="form-control">
                  <option value="entry">🌱 Entry Level (Beginner)</option>
                  <option value="intermediate" selected>⚡ Intermediate</option>
                  <option value="expert">🔥 Expert / Senior</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Location Preference</label>
                <select id="remote" class="form-control">
                  <option value="remote">🌐 Remote</option>
                  <option value="onsite">🏫 Onsite (Campus)</option>
                  <option value="hybrid">🌗 Hybrid</option>
                </select>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Team Size Needed</label>
                <input type="number" id="tsize" min="1" max="10" value="1" required class="form-control">
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Project Duration</label>
                <select id="dur" class="form-control">
                  <option value="3-7 days">3-7 days</option>
                  <option value="2-4 weeks" selected>2-4 weeks</option>
                  <option value="1-3 months">1-3 months</option>
                  <option value="3-6 months">3-6 months</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:0; display:flex; flex-direction:column; justify-content:center; padding-top:.82rem">
                <label style="font-weight:600;font-size:.82rem; display:flex; align-items:center; gap:.5rem; cursor:pointer">
                  <input type="checkbox" id="urgent" style="width:1.2rem; height:1.2rem; cursor:pointer">
                  🔥 Urgent Hiring Badge
                </label>
              </div>
            </div>

            <div class="form-group" style="margin-bottom:0">
              <label style="font-weight:600;font-size:.82rem">Description & Deliverables</label>
              <textarea id="d" rows="4" placeholder="Describe what you need, expected deliverables, and any specific requirements..." required class="form-control"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem; align-items:end">
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Budget (Credits)</label>
                <div style="display:flex; gap:.5rem">
                  <input type="number" id="b" min="5" placeholder="100" required class="form-control">
                  <button type="button" id="ai-estimate-btn" class="btn btn-ghost" style="white-space:nowrap; display:flex; align-items:center; gap:.25rem; font-size:.82rem; padding:.5rem .75rem">
                    🪄 AI Estimate
                  </button>
                </div>
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-weight:600;font-size:.82rem">Deadline</label>
                <input type="date" id="dl" class="form-control">
              </div>
            </div>

            <div style="display:flex;gap:.75rem;justify-content:flex-end;padding-top:.5rem">
              <button type="button" class="btn btn-ghost btn-sm" onclick="location.href='dashboard.html'">Cancel</button>
              <button type="submit" class="btn btn-primary">Publish Project</button>
            </div>
          </form>

          <!-- Side Tips -->
          <div style="display:flex;flex-direction:column;gap:1rem">
            <article class="glass card" style="padding:1.25rem">
              <h4 style="font-size:.88rem;margin-bottom:.5rem">💡 Tips for Great Projects</h4>
              <ul style="font-size:.78rem;color:var(--text-secondary);line-height:1.65;padding-left:1rem;margin:0">
                <li>Be specific about deliverables</li>
                <li>List exact tech skills needed</li>
                <li>Set realistic deadlines</li>
                <li>Budget fairly — quality costs credits</li>
              </ul>
            </article>
            <article class="glass card" style="padding:1.25rem">
              <h4 style="font-size:.88rem;margin-bottom:.5rem">🛡️ How Escrow Works</h4>
              <p style="font-size:.78rem;color:var(--text-secondary);line-height:1.5">When you hire a freelancer, your budget is locked in escrow. Credits are only released after you approve the submitted work.</p>
            </article>
          </div>
        </div>
      `;

      // Handle AI Estimator Button Click
      document.getElementById('ai-estimate-btn').onclick = async () => {
        const catId = +document.getElementById('cat').value;
        const skills = document.getElementById('skills').value.trim();
        const eLevel = document.getElementById('elevel').value;
        
        let complexity = "medium";
        if (eLevel === "entry") complexity = "low";
        if (eLevel === "expert") complexity = "high";

        try {
          showToast('AI is estimating project scale...', 'info');
          const res = await API.post('/ai/project-estimate', {
            category_id: catId,
            skills_required: skills,
            complexity: complexity
          });
          
          if (res) {
            document.getElementById('b').value = Math.round(res.suggested_budget);
            if (res.suggested_duration) {
              document.getElementById('dur').value = res.suggested_duration;
            }
            if (res.recommended_skills && res.recommended_skills.length > 0 && !skills) {
              document.getElementById('skills').value = res.recommended_skills.join(', ');
            }
            showToast(`AI Suggested: ${Math.round(res.suggested_budget)} Cr | Duration: ${res.suggested_duration}`, 'success');
          }
        } catch (err) {
          showToast('AI suggestion failed: ' + err.message, 'error');
        }
      };

      document.getElementById('pf').onsubmit = async e => {
        e.preventDefault();
        const budget = +document.getElementById('b').value;
        try {
          const user = await API.get('/auth/me');
          if (budget > user.wallet_balance) {
            showToast(`Insufficient funds! You have ${user.wallet_balance.toFixed(0)} Cr.`, 'error');
            return;
          }
          await API.post('/projects', {
            title: document.getElementById('t').value.trim(),
            description: document.getElementById('d').value.trim(),
            budget: budget,
            deadline: document.getElementById('dl').value || null,
            category_id: +document.getElementById('cat').value,
            skills_required: document.getElementById('skills').value.trim(),
            project_type: document.getElementById('ptype').value,
            experience_level: document.getElementById('elevel').value,
            remote_onsite: document.getElementById('remote').value,
            team_size: +document.getElementById('tsize').value,
            duration: document.getElementById('dur').value,
            is_urgent: document.getElementById('urgent').checked
          });
          showToast('Project published!', 'success');
          location.href = 'manage-projects.html';
        } catch (err) {
          showToast('Failed: ' + err.message, 'error');
        }
      };
    });
  </script>
</body>
</html>
