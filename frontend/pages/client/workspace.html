<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Workdesk | SkillSwap</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <style>
    /* Workspace splits layout */
    .workspace-layout {
      display: grid;
      grid-template-columns: 1.2fr 2fr;
      gap: 1.5rem;
      margin-top: 1rem;
    }
    @media (max-width: 1100px) {
      .workspace-layout {
        grid-template-columns: 1fr;
      }
    }
    /* Timeline progress steps */
    .timeline-bar {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin: 1.5rem 0;
    }
    .timeline-bar::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--border);
      z-index: 1;
      transform: translateY(-50%);
    }
    .timeline-step {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 2px solid var(--border);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .timeline-step.active {
      border-color: var(--accent);
      background: var(--accent-glow);
      color: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .timeline-step.completed {
      border-color: var(--success);
      background: var(--success);
      color: #fff;
    }
    /* Kanban Boards */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
    }
    @media (max-width: 768px) {
      .kanban-board {
        grid-template-columns: 1fr;
      }
    }
    .kanban-col {
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 0.75rem;
      min-height: 350px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .kanban-col h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .kanban-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .kanban-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .kanban-card h4 {
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
      font-weight: 700;
    }
    .kanban-card p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    /* ── Workspace Chat Panel ── */
    .ws-chat-wrap { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-top:1.5rem; }
    @media (max-width:900px) { .ws-chat-wrap { grid-template-columns:1fr; } }
    .ws-chat-box { display:flex; flex-direction:column; height:360px; border-radius:var(--radius-lg); overflow:hidden; }
    .ws-chat-header { padding:0.85rem 1.25rem; background:var(--gradient-hero); color:#fff; font-weight:700; font-family:var(--font-heading); font-size:0.95rem; display:flex; align-items:center; gap:0.5rem; }
    .ws-chat-messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:0.6rem; background:var(--bg-glass); backdrop-filter:blur(var(--blur)); }
    .ws-msg { max-width:80%; padding:0.55rem 0.85rem; border-radius:var(--radius-md); font-size:0.88rem; line-height:1.45; word-break:break-word; }
    .ws-msg.sent { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
    .ws-msg.recv { align-self:flex-start; background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-primary); border-bottom-left-radius:4px; }
    .ws-msg .msg-meta { font-size:0.68rem; opacity:0.65; margin-top:0.2rem; }
    .ws-chat-input-row { display:flex; gap:0.5rem; padding:0.65rem 0.85rem; border-top:1px solid var(--border); background:var(--bg-secondary); }
    .ws-chat-input-row input { flex:1; padding:0.5rem 0.85rem; border-radius:var(--radius-md); border:1px solid var(--border); background:var(--bg-primary); color:var(--text-primary); font-size:0.9rem; }
    .ws-chat-input-row button { background:var(--gradient-hero); border:none; color:#fff; border-radius:var(--radius-md); padding:0 1rem; font-weight:700; cursor:pointer; transition:opacity 0.2s; }
    .ws-chat-input-row button:hover { opacity:0.85; }
    .ws-typing { font-size:0.75rem; color:var(--text-secondary); padding:0.2rem 1rem; min-height:1.2rem; font-style:italic; }
    .review-panel { padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .review-panel h3 { font-size:1rem; }
    .review-panel p { font-size:0.85rem; color:var(--text-secondary); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/toast.js"></script>
  <script src="/frontend/js/theme.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/components.js"></script>
  <script src="/frontend/js/socket.js"></script>
  <script src="/frontend/js/dashboard-layout.js"></script>

  <script>
    initDashboard('client', 'workspace', 'Collaborative Workdesk', function(el) {
      el.innerHTML = `
        <div style="margin-bottom:1.5rem" id="project-selector-wrapper">
          <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.5rem">Select Hired Project Workspace</label>
          <select id="workspace-project-select" class="form-control" style="max-width:400px" onchange="switchWorkspaceProject()">
            <option value="">-- Choose Hired Project --</option>
          </select>
        </div>

        <div id="workspace-root" style="display:none">
          
          <!-- Animated Lifecycle progress bar tracker -->
          <article class="glass card" style="margin-bottom:1.5rem">
            <h2>🎯 Project Lifecycle Progress</h2>
            <div class="timeline-bar" id="timeline-progressbar">
              <div class="timeline-step" id="step-open" title="Open Recruitment">1</div>
              <div class="timeline-step" id="step-in_progress" title="In Development">2</div>
              <div class="timeline-step" id="step-submitted" title="Submitted for Review">3</div>
              <div class="timeline-step" id="step-completed" title="Completed & Released">4</div>
            </div>
            <div style="display:flex;justify-content:between;align-items:center;margin-top:0.5rem">
              <span id="lifecycle-status-label" style="font-weight:700;color:var(--accent)">Status: In Progress</span>
              
              <!-- Handoff review action console -->
              <div style="display:none;gap:0.5rem" id="review-action-console">
                <button class="btn btn-ghost btn-sm" onclick="requestProjectRevision()">⚠️ Request Revision</button>
                <button class="btn btn-primary btn-sm" onclick="openReviewModal()">✅ Approve & Release Payout</button>
              </div>
            </div>
          </article>

          <div class="workspace-layout">
            
            <!-- LEFT COLUMN: ESCROW, FILE HANDOFFS, & TIMELINES -->
            <div style="display:flex;flex-direction:column;gap:1.5rem">
              
              <!-- Virtual Escrow milestone card -->
              <article class="glass card">
                <h2>💳 Active Milestone Escrow</h2>
                <div style="margin-top:1rem;padding:1rem;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-lg)">
                  <div style="display:flex;justify-content:between;margin-bottom:0.5rem">
                    <span style="font-size:0.85rem;color:var(--text-secondary)">Escrow Amount</span>
                    <strong style="color:var(--success)" id="escrow-budget">0.00 Cr</strong>
                  </div>
                  <div style="display:flex;justify-content:between;margin-bottom:1rem">
                    <span style="font-size:0.85rem;color:var(--text-secondary)">Milestone Note</span>
                    <span style="font-size:0.85rem" id="escrow-milestone">Direct Contract</span>
                  </div>
                  <div style="display:flex;gap:0.75rem">
                    <button class="btn btn-ghost btn-sm" style="flex:1" onclick="triggerMilestoneDispute()">⚖️ Open Dispute</button>
                  </div>
                </div>
              </article>

              <!-- Shared File Attachments drawer -->
              <article class="glass card">
                <h2>📂 Work deliverables Drawer</h2>
                <p style="font-size:0.82rem;color:var(--text-secondary);margin-top:0.25rem">Upload design references or view freelancer work links.</p>
                
                <div style="display:flex;gap:0.5rem;margin-top:1rem">
                  <input type="text" id="work-file-title" class="form-control" placeholder="Attachment Title" style="flex:1">
                  <input type="text" id="work-file-path" class="form-control" placeholder="URL or Preview path" style="flex:1.5">
                  <button class="btn btn-primary" onclick="uploadWorkDeliverable()">Attach</button>
                </div>

                <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:1.25rem" id="shared-files-list">
                  <p style="color:var(--text-secondary);font-size:0.85rem">No attachments shared yet.</p>
                </div>
              </article>

              <!-- Running timeline logs -->
              <article class="glass card">
                <h3>📜 Workspace Activity Log</h3>
                <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:1rem;max-height:200px;overflow-y:auto" id="workspace-activity-logs">
                  <p style="color:var(--text-secondary);font-size:0.85rem">No events logged yet.</p>
                </div>
              </article>

            </div>

            <!-- RIGHT COLUMN: COLLABORATIVE KANBAN BOARD -->
            <article class="glass card">
              <div style="display:flex;justify-content:between;align-items:center">
                <h2>📋 Linear Workspace Taskboard</h2>
                <button class="btn btn-primary btn-sm" onclick="openAddTaskModal()">+ Create Card</button>
              </div>
              <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:0.25rem">Organize, claim, and advance task items in real-time.</p>
              
              <div class="kanban-board">
                <div class="kanban-col" id="col-todo">
                  <h3>To Do <span class="badge" id="badge-todo">0</span></h3>
                  <div class="column-cards" id="cards-todo" style="display:flex;flex-direction:column;gap:0.5rem"></div>
                </div>
                <div class="kanban-col" id="col-in_progress">
                  <h3>In Progress <span class="badge" id="badge-in_progress">0</span></h3>
                  <div class="column-cards" id="cards-in_progress" style="display:flex;flex-direction:column;gap:0.5rem"></div>
                </div>
                <div class="kanban-col" id="col-review">
                  <h3>In Review <span class="badge" id="badge-review">0</span></h3>
                  <div class="column-cards" id="cards-review" style="display:flex;flex-direction:column;gap:0.5rem"></div>
                </div>
                <div class="kanban-col" id="col-done">
                  <h3>Completed <span class="badge" id="badge-done">0</span></h3>
                  <div class="column-cards" id="cards-done" style="display:flex;flex-direction:column;gap:0.5rem"></div>
                </div>
              </div>
            </article>

          </div>

        </div>

          <!-- ═══ CHAT + REVIEW PANEL ═══ -->
          <div class="ws-chat-wrap">

            <!-- Real-time Project Chat -->
            <div class="glass ws-chat-box">
              <div class="ws-chat-header">💬 Project Chat <span id="ws-other-name" style="font-weight:400;font-size:0.82rem;opacity:0.85"></span></div>
              <div class="ws-chat-messages" id="ws-chat-messages">
                <p style="color:var(--text-secondary);font-size:0.85rem;text-align:center;padding-top:2rem">Select a project to load chat…</p>
              </div>
              <div class="ws-typing" id="ws-typing-indicator"></div>
              <div class="ws-chat-input-row">
                <input type="file" id="ws-chat-file" style="display:none" onchange="wsUploadChatFile(event, 'ws-chat-input')">
                <button class="btn btn-ghost" style="padding:0;background:transparent;color:var(--text-secondary);font-size:1.2rem;box-shadow:none" onclick="document.getElementById('ws-chat-file').click()" title="Attach file">📎</button>
                <input type="text" id="ws-chat-input" placeholder="Message the freelancer…" onkeydown="wsChatKeydown(event)">
                <button class="btn btn-primary btn-sm" onclick="wsSendMsg()">Send</button>
              </div>
            </div>

            <!-- Submission Review Panel -->
            <div class="glass card review-panel">
              <h3>📋 Submission Review</h3>
              <div id="ws-review-status"><p>No deliverables submitted yet.</p></div>
              <div id="ws-review-actions" style="display:none;display:flex;flex-direction:column;gap:0.75rem">
                <button class="btn btn-primary" onclick="openReviewModal()">✅ Approve &amp; Release Payment</button>
                <button class="btn btn-ghost" onclick="requestProjectRevision()">⚠️ Request Revision</button>
                <button class="btn btn-ghost" style="color:var(--danger);border-color:var(--danger)" onclick="triggerMilestoneDispute()">⚖️ Open Dispute</button>
              </div>
            </div>

          </div>

        </div>

        <!-- Create Task modal layout overlay -->
        <div class="overlay-modal" id="task-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center">
          <div class="glass card" style="max-width:450px;width:90%">
            <h2>Create Task Card</h2>
            <div style="margin-top:1.25rem">
              <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.25rem">Card Title</label>
              <input type="text" id="modal-task-title" class="form-control" style="width:100%;margin-bottom:0.75rem">
              
              <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.25rem">Description</label>
              <textarea id="modal-task-desc" class="form-control" style="width:100%;height:80px;margin-bottom:0.75rem"></textarea>

              <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.25rem">Starting Column</label>
              <select id="modal-task-col" class="form-control" style="width:100%;margin-bottom:1rem">
                <option value="todo">To Do</option>
                <option value="in_progress">In Progress</option>
                <option value="review">In Review</option>
              </select>
            </div>
            <div style="display:flex;justify-content:end;gap:0.75rem">
              <button class="btn btn-ghost" onclick="closeTaskModal()">Cancel</button>
              <button class="btn btn-primary" onclick="createTaskCard()">Save Card</button>
            </div>
          </div>
        </div>

        <!-- Mandatory Review Modal layout overlay -->
        <div class="overlay-modal" id="review-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center">
          <div class="glass card" style="max-width:450px;width:90%">
            <h2>Project Approval & Review</h2>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:0.25rem">Before releasing payment, please rate and review the freelancer's work.</p>
            <div style="margin-top:1.25rem">
              <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.25rem">Star Rating</label>
              <div style="display:flex;gap:0.25rem;margin-bottom:0.75rem" id="modal-review-stars">
                <span style="cursor:pointer;font-size:1.8rem;color:var(--text-secondary)" onclick="setModalReviewScore(1)">☆</span>
                <span style="cursor:pointer;font-size:1.8rem;color:var(--text-secondary)" onclick="setModalReviewScore(2)">☆</span>
                <span style="cursor:pointer;font-size:1.8rem;color:var(--text-secondary)" onclick="setModalReviewScore(3)">☆</span>
                <span style="cursor:pointer;font-size:1.8rem;color:var(--text-secondary)" onclick="setModalReviewScore(4)">☆</span>
                <span style="cursor:pointer;font-size:1.8rem;color:var(--text-secondary)" onclick="setModalReviewScore(5)">☆</span>
              </div>
              
              <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:0.25rem">Feedback</label>
              <textarea id="modal-review-comment" class="form-control" style="width:100%;height:80px;margin-bottom:0.75rem" placeholder="Share your experience working with this freelancer..."></textarea>
            </div>
            <div style="display:flex;justify-content:end;gap:0.75rem">
              <button class="btn btn-ghost" onclick="closeReviewModal()">Cancel</button>
              <button class="btn btn-primary" onclick="submitMandatoryReviewAndRelease()">Submit & Release Payment</button>
            </div>
          </div>
        </div>
      `;

      // Load client projects and auto-select from URL param
      loadWorkspaceProjects();
    });

    function loadWorkspaceProjects() {
      API.get('/projects/my').then(projs => {
        const select = document.getElementById('workspace-project-select');
        const activeCampaigns = projs.filter(p => p.status !== 'open' && p.status !== 'draft');
        
        if (activeCampaigns.length === 0) {
          select.innerHTML = '<option value="">-- No Active Contracts Found --</option>';
          return;
        }

        select.innerHTML = '<option value="">-- Choose Active Project --</option>' + activeCampaigns.map(p => `
          <option value="${p.id}">${p.title} (${p.status.toUpperCase()})</option>
        `).join('');

        // Auto-select project from URL ?project=ID
        const urlPid = new URLSearchParams(location.search).get('project');
        if (urlPid) {
          select.value = urlPid;
          switchWorkspaceProject();
        }
      }).catch(err => {
        showToast('Failed to load contract directory: ' + err.message, 'error');
      });
    }

    function switchWorkspaceProject() {
      const pid = document.getElementById('workspace-project-select').value;
      if (!pid) {
        document.getElementById('workspace-root').style.display = 'none';
        return;
      }
      
      document.getElementById('workspace-root').style.display = 'block';
      refreshWorkspaceData(pid);
    }

    function refreshWorkspaceData(pid) {
      Promise.all([
        API.get(`/projects/${pid}`),
        API.get(`/projects/${pid}/timeline`),
        API.get(`/projects/${pid}/kanban`),
        API.get(`/projects/${pid}/files`),
        API.get(`/projects/${pid}/payments`)
      ]).then(([project, timeline, tasks, files, payments]) => {
        
        // 1. Sync Progress Timeline nodes
        document.getElementById('lifecycle-status-label').textContent = `Status: ${project.status.toUpperCase()}`;
        
        const steps = ['open', 'in_progress', 'submitted', 'completed'];
        const currentIdx = steps.indexOf(project.status.toLowerCase());
        
        steps.forEach((step, idx) => {
          const node = document.getElementById(`step-${step}`);
          if (node) {
            node.className = 'timeline-step';
            if (idx < currentIdx) {
              node.classList.add('completed');
            } else if (idx === currentIdx) {
              node.classList.add('active');
            }
          }
        });

        // Toggle review actions if status is submitted
        const reviewConsole = document.getElementById('review-action-console');
        if (project.status.toLowerCase() === 'submitted') {
          reviewConsole.style.display = 'flex';
        } else {
          reviewConsole.style.display = 'none';
        }

        // 2. Render Escrow card
        const escrow = payments.find(p => p.status === 'escrowed' || p.status === 'disputed');
        if (escrow) {
          document.getElementById('escrow-budget').textContent = escrow.amount.toFixed(2) + ' Cr';
          document.getElementById('escrow-milestone').textContent = escrow.milestone || 'Project Escrow Deposit';
        } else {
          document.getElementById('escrow-budget').textContent = 'Released / Completed';
          document.getElementById('escrow-milestone').textContent = 'Escrow Ledger closed';
        }

        // 3. Render Shared work files
        const filesContainer = document.getElementById('shared-files-list');
        if (!files || files.length === 0) {
          filesContainer.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem">No attachments shared yet.</p>';
        } else {
          filesContainer.innerHTML = files.map(f => `
            <div style="display:flex;justify-content:between;align-items:center;padding:0.5rem 0.75rem;border-radius:var(--radius-sm);background:rgba(255,255,255,0.01);border:1px solid var(--border)">
              <span style="font-size:0.85rem;font-weight:700">${f.filename}</span>
              <a href="${f.file_path}" target="_blank" class="btn btn-ghost btn-sm" style="margin-left:auto">🔗 View Link</a>
            </div>
          `).join('');
        }

        // 4. Render Running Timeline logs
        const logsContainer = document.getElementById('workspace-activity-logs');
        if (!timeline || timeline.length === 0) {
          logsContainer.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem">No events logged yet.</p>';
        } else {
          logsContainer.innerHTML = timeline.map(t => `
            <div style="padding:0.4rem;border-left:2px solid var(--accent);padding-left:0.75rem;margin-bottom:0.4rem">
              <div style="font-size:0.8rem;font-weight:700">${t.details || t.status}</div>
              <span style="font-size:0.7rem;color:var(--text-secondary)">${formatDate(t.created_at)}</span>
            </div>
          `).join('');
        }

        // 5. Render Taskboard Cards
        const columns = ['todo', 'in_progress', 'review', 'done'];
        columns.forEach(col => {
          const colTasks = tasks.filter(t => t.column === col);
          document.getElementById(`badge-${col}`).textContent = colTasks.length;
          const colCards = document.getElementById(`cards-${col}`);
          colCards.innerHTML = colTasks.map(t => `
            <div class="kanban-card" onclick="advanceKanbanTask(${t.id}, '${t.column}')">
              <h4>${t.title}</h4>
              <p>${t.description || 'No description provided.'}</p>
              <div style="display:flex;justify-content:between;align-items:center;margin-top:0.5rem;font-size:0.7rem;color:var(--accent)">
                <span>${t.column.replace('_',' ').toUpperCase()}</span>
                <span>⚡ Shift</span>
              </div>
            </div>
          `).join('');
        });

        // 6. Init workspace chat
        wsInitChat(project);

      }).catch(err => {
        showToast('Workspace sync failure: ' + err.message, 'error');
      });
    }

    // Kanban Actions
    function openAddTaskModal() {
      document.getElementById('task-modal').style.display = 'flex';
    }
    function closeTaskModal() {
      document.getElementById('task-modal').style.display = 'none';
    }
    function createTaskCard() {
      const pid = document.getElementById('workspace-project-select').value;
      const title = document.getElementById('modal-task-title').value;
      const desc = document.getElementById('modal-task-desc').value;
      const col = document.getElementById('modal-task-col').value;

      if (!title) {
        showToast('Card title is required!', 'warning');
        return;
      }

      API.post(`/projects/${pid}/kanban`, {
        title: title,
        description: desc,
        column: col
      }).then(() => {
        showToast('Kanban card created!', 'success');
        closeTaskModal();
        
        document.getElementById('modal-task-title').value = '';
        document.getElementById('modal-task-desc').value = '';

        refreshWorkspaceData(pid);
      }).catch(err => {
        showToast('Card creation failed: ' + err.message, 'error');
      });
    }

    function advanceKanbanTask(taskId, currentColumn) {
      const pid = document.getElementById('workspace-project-select').value;
      const nextColumns = {
        'todo': 'in_progress',
        'in_progress': 'review',
        'review': 'done',
        'done': 'todo'
      };
      
      const nextCol = nextColumns[currentColumn];
      API.put(`/projects/kanban/${taskId}`, { column: nextCol }).then(() => {
        showToast('Task shifted successfully!', 'success');
        refreshWorkspaceData(pid);
      }).catch(err => {
        showToast('Failed to shift task: ' + err.message, 'error');
      });
    }

    // Attach File
    function uploadWorkDeliverable() {
      const pid = document.getElementById('workspace-project-select').value;
      const title = document.getElementById('work-file-title').value;
      const path = document.getElementById('work-file-path').value;

      if (!title || !path) {
        showToast('Title and URL/Path required!', 'warning');
        return;
      }

      API.post(`/projects/${pid}/files`, {
        filename: title,
        file_path: path
      }).then(() => {
        showToast('Work reference attached!', 'success');
        
        document.getElementById('work-file-title').value = '';
        document.getElementById('work-file-path').value = '';

        refreshWorkspaceData(pid);
      }).catch(err => {
        showToast('Attachment upload failed: ' + err.message, 'error');
      });
    }

    // ═══════════════════════════════════════
    // WORKSPACE CHAT — real-time Socket.IO
    // ═══════════════════════════════════════
    let wsConvId = null;
    let wsMeId = null;
    let wsOtherId = null;
    let wsTypingTimeout = null;
    let currentReviewScore = 0;

    function wsInitChat(project) {
      const me = JSON.parse(localStorage.getItem(CONFIG.USER_KEY) || '{}');
      wsMeId = me.id;
      wsOtherId = project.hired_freelancer_id;
      if (!wsOtherId) return;
      document.getElementById('ws-other-name').textContent = '— Freelancer';

      API.post('/chat/conversations', { user_id: wsOtherId, project_id: project.id })
        .then(res => {
          wsConvId = res.conversation_id;
          wsLoadMessages();
          const sock = initSocket();
          if (sock) {
            joinConversation(wsConvId);
            onNewMessage(msg => {
              if (msg.conversation_id === wsConvId) wsAppendMessage(msg);
            });
            sock.on('typing', d => {
              if (d.conversation_id === wsConvId && d.user_id !== wsMeId)
                document.getElementById('ws-typing-indicator').textContent = 'Freelancer is typing…';
            });
            sock.on('stop_typing', d => {
              if (d.conversation_id === wsConvId)
                document.getElementById('ws-typing-indicator').textContent = '';
            });
          }
        }).catch(() => {});

      // Update review panel based on project status
      wsUpdateReviewPanel(project);
    }

    function wsLoadMessages() {
      if (!wsConvId) return;
      API.get(`/chat/conversations/${wsConvId}/messages`)
        .then(msgs => {
          const box = document.getElementById('ws-chat-messages');
          if (!msgs.length) {
            box.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem;text-align:center;padding-top:2rem">No messages yet. Start the conversation! 🗨️</p>';
            return;
          }
          box.innerHTML = '';
          msgs.forEach(m => wsAppendMessage(m, false));
          box.scrollTop = box.scrollHeight;
        }).catch(() => {});
    }

    function wsAppendMessage(msg, scroll = true) {
      const box = document.getElementById('ws-chat-messages');
      if (box.querySelector('p')) box.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'ws-msg ' + (msg.sender_id === wsMeId ? 'sent' : 'recv');
      const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
      
      let htmlContent = escapeHtml(msg.content);
      // Auto-link URLs
      htmlContent = htmlContent.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:inherit;text-decoration:underline">$1</a>');

      div.innerHTML = `${htmlContent}<div class="msg-meta">${msg.sender_name||''} · ${time}</div>`;
      box.appendChild(div);
      if (scroll) box.scrollTop = box.scrollHeight;
    }

    function wsChatKeydown(e) {
      if (e.key === 'Enter') { wsSendMsg(); return; }
      emitTyping(wsConvId);
      clearTimeout(wsTypingTimeout);
      wsTypingTimeout = setTimeout(() => emitStopTyping(wsConvId), 1500);
    }

    function wsSendMsg() {
      const input = document.getElementById('ws-chat-input');
      const text = input.value.trim();
      if (!text || !wsConvId) return;
      sendSocketMessage(wsConvId, text);
      wsAppendMessage({ sender_id: wsMeId, content: text, sender_name: 'You', created_at: new Date().toISOString() });
      input.value = '';
      emitStopTyping(wsConvId);
    }

    async function wsUploadChatFile(e, inputId) {
      const file = e.target.files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      try {
        const res = await fetch(CONFIG.API_URL + '/chat/upload', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem(CONFIG.TOKEN_KEY) },
          body: formData
        });
        const data = await res.json();
        if (data.file_path) {
          const inputEl = document.getElementById(inputId);
          inputEl.value = (inputEl.value + ' ' + location.origin + data.file_path).trim();
          showToast('Attachment uploaded! Ready to send.', 'success');
        } else {
          showToast(data.error || 'Upload failed', 'error');
        }
      } catch (err) {
        showToast('Upload failed: ' + err.message, 'error');
      }
      e.target.value = '';
    }

    function wsUpdateReviewPanel(project) {
      const statusEl = document.getElementById('ws-review-status');
      const actionsEl = document.getElementById('ws-review-actions');
      // Find submitted deliverable in files
      API.get(`/projects/${project.id}/files`).then(files => {
        const submission = files.find(f => f.filename && f.filename.includes('Deliverable'));
        if (project.status === 'submitted') {
          statusEl.innerHTML = `
            <div style="padding:0.75rem;border:1px solid var(--warning);border-radius:var(--radius-md);background:rgba(245,158,11,0.06)">
              <div style="font-weight:700;font-size:0.9rem;color:var(--warning)">⏳ Awaiting Your Review</div>
              ${submission ? `<a href="${submission.file_path}" target="_blank" class="btn btn-ghost btn-sm" style="margin-top:0.5rem">🔗 View Deliverable</a>` : ''}
            </div>`;
          actionsEl.style.display = 'flex';
        } else if (project.status === 'completed') {
          statusEl.innerHTML = `
            <div style="background:rgba(16,185,129,0.1);padding:1.25rem;border-radius:var(--radius-lg);border:1px solid rgba(16,185,129,0.3)">
              <div style="color:var(--success);font-weight:800;font-size:1.05rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem">
                <span>✅</span> Project Completed & Paid
              </div>
              <div id="review-form-container" style="background:var(--bg-primary);padding:1rem;border-radius:var(--radius-md);border:1px solid var(--border)">
                <p style="color:var(--text-secondary);font-size:0.9rem">Feedback has been provided and payment released.</p>
              </div>
            </div>
          `;
          actionsEl.style.display = 'none';
        } else {
          statusEl.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem">No deliverables submitted yet. The freelancer is working on the project.</p>';
          actionsEl.style.display = 'none';
        }
      }).catch(() => {});
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setModalReviewScore(score) {
      currentReviewScore = score;
      const stars = document.getElementById('modal-review-stars').children;
      for (let i = 0; i < 5; i++) {
        stars[i].textContent = i < score ? '⭐' : '☆';
        stars[i].style.color = i < score ? 'var(--warning)' : 'var(--text-secondary)';
      }
    }

    function openReviewModal() {
      document.getElementById('review-modal').style.display = 'flex';
      setModalReviewScore(0);
      document.getElementById('modal-review-comment').value = '';
    }

    function closeReviewModal() {
      document.getElementById('review-modal').style.display = 'none';
    }

    function submitMandatoryReviewAndRelease() {
      if (!currentReviewScore) {
        showToast('Please select a star rating first.', 'warning');
        return;
      }
      const comment = document.getElementById('modal-review-comment').value.trim();
      if (comment.length < 10) {
        showToast('Please provide at least 10 characters of feedback.', 'warning');
        return;
      }
      
      const pid = document.getElementById('workspace-project-select').value;
      if (!wsOtherId) return showToast('Error identifying freelancer.', 'error');

      // 1. Submit the review
      API.post(`/projects/${pid}/reviews`, {
        reviewee_id: wsOtherId,
        rating: currentReviewScore,
        comment: comment
      }).then(() => {
        // 2. Release payment upon successful review
        return API.post(`/projects/${pid}/payments`, {
          milestone: "Final Handoff Review Approved & Credits Released"
        });
      }).then(() => {
        // 3. Log timeline release completion
        return API.post(`/projects/${pid}/timeline`, {
          status: "completed",
          details: "Client provided feedback and released locked Escrow credits."
        });
      }).then(() => {
        closeReviewModal();
        showToast('🎉 Review submitted & Escrow released successfully!', 'success');
        refreshWorkspaceData(pid);
      }).catch(err => {
        showToast('Transaction failed: ' + err.message, 'error');
      });
    }

    // Approving and Releasing Escrowed Payout (Now chained in submitMandatoryReviewAndRelease)

    // Revision Requests — uses the dedicated /request-revision endpoint
    function requestProjectRevision() {
      const pid = document.getElementById('workspace-project-select').value;
      const notes = prompt("Enter specific revision notes for the freelancer:");
      if (!notes) return;

      API.post(`/projects/${pid}/request-revision`, { notes })
        .then(() => {
          showToast('Revision request sent. Contract returned to development.', 'warning');
          refreshWorkspaceData(pid);
        })
        .catch(err => showToast('Failed to request revision: ' + err.message, 'error'));
    }

    // Open Disputes
    function triggerMilestoneDispute() {
      const pid = document.getElementById('workspace-project-select').value;
      const title = prompt("Enter Dispute Title / Main issue:");
      if (!title) return;
      const reason = prompt("Describe the issue in detail for Admin mediation:");
      if (!reason) return;
      
      API.post('/disputes', {
        project_id: pid,
        title: title,
        reason: reason,
        evidence_url: "Client workspace files"
      }).then(() => {
        showToast('⚠️ Contract flagged under Disputed. Payout lock holds active.', 'error');
        refreshWorkspaceData(pid);
      }).catch(err => {
        showToast('Failed to file dispute: ' + err.message, 'error');
      });
    }
  </script>
</body>
