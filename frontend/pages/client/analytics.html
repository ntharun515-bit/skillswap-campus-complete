<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | SkillSwap</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" defer></script>
  <!-- Load Premium Chart.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 1.25rem;
      margin-top: 1.25rem;
    }
    .chart-card {
      padding: 1.25rem 1.5rem;
      min-height: 280px;
    }
    .chart-card h3 {
      margin-bottom: .75rem;
      font-size: .95rem;
      color: var(--text-primary);
    }
    canvas {
      width: 100% !important;
      height: 220px !important;
    }
    @media (max-width: 600px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/toast.js"></script>
  <script src="/frontend/js/theme.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/components.js"></script>

  <script src="/frontend/js/socket.js"></script>
  <script src="/frontend/js/dashboard-layout.js"></script>

  <script>
    initDashboard('client', 'analytics', 'Analytics', function(el) {
      el.innerHTML = `
        <div class="stats-grid" id="stats-container">
          <div class="glass card skeleton" style="height:80px"></div>
          <div class="glass card skeleton" style="height:80px"></div>
          <div class="glass card skeleton" style="height:80px"></div>
          <div class="glass card skeleton" style="height:80px"></div>
        </div>
        <div class="charts-grid">
          <div class="glass card chart-card">
            <h3>💰 Budget Allocation per Project</h3>
            <canvas id="budgetChart"></canvas>
          </div>
          <div class="glass card chart-card">
            <h3>📊 Projects by Status</h3>
            <canvas id="statusChart"></canvas>
          </div>
        </div>
      `;

      // Load live project data
      API.get('/projects/my').then(projects => {
        if (!projects || projects.length === 0) {
          document.getElementById('stats-container').innerHTML = `
            <div class="glass card" style="grid-column: 1/-1; padding: 2rem; text-align: center;">
              <h3>No project analytics available</h3>
              <p style="color:var(--text-secondary)">Post a project to unlock charts and spending analytics.</p>
              <a href="post-project.html" class="btn btn-primary" style="margin-top:1rem">Post First Project</a>
            </div>
          `;
          return;
        }

        // 1. Calculate stats metrics
        const totalProjects = projects.length;
        const openProjects = projects.filter(p => p.status === 'open').length;
        const activeProjects = projects.filter(p => p.status === 'in_progress').length;
        const completedProjects = projects.filter(p => p.status === 'completed').length;
        const totalBudget = projects.reduce((sum, p) => sum + (parseFloat(p.budget) || 0), 0);

        document.getElementById('stats-container').innerHTML = `
          <article class="glass stat-card">
            <span class="label">Total Projects</span>
            <span class="value">${totalProjects}</span>
          </article>
          <article class="glass stat-card">
            <span class="label">Open Roles</span>
            <span class="value">${openProjects}</span>
          </article>
          <article class="glass stat-card">
            <span class="label">In Progress</span>
            <span class="value">${activeProjects}</span>
          </article>
          <article class="glass stat-card">
            <span class="label">Total Funded</span>
            <span class="value">${formatMoney(totalBudget)}</span>
          </article>
        `;

        // 2. Prepare Chart.js parameters
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const textColor = isDark ? '#f1f5f9' : '#0f172a';
        const borderColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(15,23,42,0.08)';

        // Line Chart: Budgets
        const budgetCtx = document.getElementById('budgetChart').getContext('2d');
        new Chart(budgetCtx, {
          type: 'bar',
          data: {
            labels: projects.map(p => p.title.length > 20 ? p.title.slice(0, 18) + '...' : p.title),
            datasets: [{
              label: 'Budget ($)',
              data: projects.map(p => parseFloat(p.budget) || 0),
              backgroundColor: 'rgba(13, 148, 136, 0.65)',
              borderColor: '#6366f1',
              borderWidth: 2,
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
            },
            scales: {
              y: {
                grid: { color: borderColor },
                ticks: { color: textColor }
              },
              x: {
                grid: { display: false },
                ticks: { color: textColor }
              }
            }
          }
        });

        // Doughnut Chart: Statuses
        const statusCtx = document.getElementById('statusChart').getContext('2d');
        new Chart(statusCtx, {
          type: 'doughnut',
          data: {
            labels: ['Open', 'In Progress', 'Completed'],
            datasets: [{
              data: [openProjects, activeProjects, completedProjects],
              backgroundColor: [
                'rgba(16, 185, 129, 0.7)', // green
                'rgba(245, 158, 11, 0.7)', // yellow
                'rgba(13, 148, 136, 0.7)'  // indigo
              ],
              borderColor: isDark ? '#151b2e' : '#ffffff',
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { color: textColor }
              }
            }
          }
        });
      }).catch(err => {
        showToast('Failed to load project metrics: ' + err.message, 'error');
      });
    });
  </script>
</body>
</html>
