<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories Workspace | SkillSwap</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script src="/frontend/js/config.js"></script>
  <script src="/frontend/js/toast.js"></script>
  <script src="/frontend/js/theme.js"></script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/components.js"></script>

  <script src="/frontend/js/socket.js"></script>
  <script src="/frontend/js/dashboard-layout.js"></script>

  <script>
    initDashboard('admin', 'categories', 'Taxonomy & Classifications', function(el) {
      el.innerHTML = `
        <div style="display:grid;grid-template-columns:300px 1fr;gap:2rem;max-width:1100px;margin:0 auto">
          <div>
            <form id="cf" class="glass card" style="padding:1.5rem;display:flex;flex-direction:column;gap:1rem;position:sticky;top:1rem">
              <h3 style="font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.25rem">➕ Create Category</h3>
              <p style="color:var(--text-secondary);font-size:0.75rem;margin-bottom:0.5rem">Add new job classification tags to categorize campus freelance gigs.</p>
              
              <div class="form-group">
                <label style="font-weight:600;font-size:0.8rem">Category Name</label>
                <input type="text" id="cn" placeholder="e.g. Translation & Writing" required style="width:100%">
              </div>
              
              <div class="form-group">
                <label style="font-weight:600;font-size:0.8rem">Unique Slug (Optional)</label>
                <input type="text" id="cs" placeholder="e.g. translation-writing" style="width:100%">
              </div>

              <div class="form-group">
                <label style="font-weight:600;font-size:0.8rem">Icon Emoji / Symbol</label>
                <input type="text" id="ci" placeholder="e.g. 📝" required style="width:100%">
              </div>

              <button class="btn btn-primary" type="submit" style="width:100%;margin-top:0.5rem">Save Category</button>
            </form>
          </div>

          <div>
            <article class="glass card" style="min-height:400px">
              <h3 style="font-size:1.25rem;margin-bottom:1.5rem">🏷️ Active Classifications</h3>
              <div id="cats" class="grid grid-3">
                <div class="glass card skeleton" style="height:100px"></div>
                <div class="glass card skeleton" style="height:100px"></div>
                <div class="glass card skeleton" style="height:100px"></div>
              </div>
            </article>
          </div>
        </div>
      `;

      const catsList = document.getElementById('cats');
      const cf = document.getElementById('cf');
      const cn = document.getElementById('cn');
      const cs = document.getElementById('cs');
      const ci = document.getElementById('ci');

      async function loadCategories() {
        try {
          catsList.innerHTML = `
            <div class="glass card skeleton" style="height:100px"></div>
            <div class="glass card skeleton" style="height:100px"></div>
            <div class="glass card skeleton" style="height:100px"></div>
          `;

          const items = await API.get('/admin/categories');
          if (items.length === 0) {
            catsList.innerHTML = `
              <div style="grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text-secondary)">
                <span style="font-size:3rem">🏷️</span>
                <p style="margin-top:1rem">No categories configured yet. Add your first item!</p>
              </div>
            `;
            return;
          }

          catsList.innerHTML = items.map(c => `
            <article class="glass card" id="category-${c.id}" style="display:flex;flex-direction:column;justify-content:between;padding:1.25rem">
              <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem">
                <span style="font-size:1.75rem">${c.icon || '💼'}</span>
                <div>
                  <h4 style="font-size:0.95rem;color:var(--text-primary);margin:0">${c.name}</h4>
                  <span style="font-family:monospace;font-size:0.72rem;color:var(--accent)">/${c.slug}</span>
                </div>
              </div>
              
              <button class="btn btn-ghost btn-sm delete-cat-btn" data-id="${c.id}" style="width:100%;margin-top:0.75rem;border-color:rgba(239,68,68,0.1);color:var(--error)">
                ❌ Delete
              </button>
            </article>
          `).join('');

          // Bind DELETE events
          catsList.querySelectorAll('.delete-cat-btn').forEach(btn => {
            btn.onclick = async () => {
              const cid = btn.dataset.id;
              if (confirm("Are you sure you want to delete this category? Active projects classified under this tag may lose their relational taxonomy.")) {
                try {
                  await API.delete(`/admin/categories?id=${cid}`);
                  showToast('Category successfully deleted!', 'success');
                  
                  // Animate out
                  const card = document.getElementById(`category-${cid}`);
                  if (card) {
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                    card.style.transition = 'opacity 0.3s, transform 0.3s';
                    setTimeout(loadCategories, 300);
                  } else {
                    loadCategories();
                  }
                } catch (err) {
                  showToast('Failed to delete category: ' + err.message, 'error');
                }
              }
            };
          });

        } catch (err) {
          showToast('Failed to load categories: ' + err.message, 'error');
        }
      }

      cf.onsubmit = async e => {
        e.preventDefault();
        try {
          await API.post('/admin/categories', {
            name: cn.value.trim(),
            slug: cs.value.trim() || cn.value.trim().toLowerCase().replace(/\s+/g, '-'),
            icon: ci.value.trim()
          });

          showToast('Category successfully saved and registered!', 'success');
          cf.reset();
          loadCategories();
        } catch (err) {
          showToast('Failed to create category: ' + err.message, 'error');
        }
      };

      loadCategories();
    });
  </script>
</body>
</html>
