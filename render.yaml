services:
  - type: web
    name: skillswap-campus
    env: docker
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:////app/database/skillswap.db
      - key: UPLOAD_FOLDER
        value: /app/uploads
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
